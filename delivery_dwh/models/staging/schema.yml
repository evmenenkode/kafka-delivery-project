version: 2

sources:
  - name: raw
    database: DELIVERY_DB
    schema: RAW

    tables:
      - name: raw_users
      - name: raw_products
      - name: raw_events

models:
  - name: stg_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

  - name: stg_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

      - name: email
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: "TO_TIMESTAMP('2000-01-01')"

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: created_at
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: "TO_TIMESTAMP('2000-01-01')"

      - name: price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0