version: 2

models:

  - name: cdm_user_activity
    description: "Business view of user engagement and revenue"
    columns:
      - name: user_id
        description: "Unique user identifier"
        tests:
          - not_null

      - name: total_events
        description: "Total number of user events"

      - name: revenue
        description: "Total revenue per user"

  - name: cdm_product_sales
    description: "Product performance metrics"
    columns:
      - name: product_id
        tests:
          - not_null

      - name: revenue
        description: "Total revenue per product"

  - name: cdm_daily_kpi
    description: "Daily business KPIs"
    columns:
      - name: date
        tests:
          - not_null

      - name: revenue
        description: "Total revenue per day"