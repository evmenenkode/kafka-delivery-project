version: 2

models:

  - name: cdm_user_activity
    description: >
      Business-level aggregated view of user engagement and revenue.
      Each row represents a single user with summarized activity metrics
      derived from event-level data in fct_events.

    meta:
      dashboard_url: "https://datastudio.google.com/reporting/f59aaaaf-5b32-43e7-a57b-f9ac32ce6a3d"

    columns:
      - name: user_id
        description: "Unique identifier of a user from the system"
        tests:
          - not_null
          - unique

      - name: total_events
        description: >
          Total number of events performed by the user across all sessions
          and event types (clicks, views, purchases, etc.).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: revenue
        description: >
          Total revenue generated by the user based on purchase-related events.
          Calculated as SUM(amount) from fct_events.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: cdm_product_sales
    description: >
      Aggregated product performance metrics showing revenue contribution
      and sales activity per product.

    meta:
      dashboard_url: "https://datastudio.google.com/reporting/f59aaaaf-5b32-43e7-a57b-f9ac32ce6a3d"

    columns:
      - name: product_id
        description: "Unique product identifier from product dimension"
        tests:
          - not_null
          - unique

      - name: revenue
        description: >
          Total revenue generated per product based on all related events.
          Used for product performance analysis.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: cdm_daily_kpi
    description: >
      Daily aggregated business KPI table used for monitoring overall
      platform performance and trends over time.

    meta:
      dashboard_url: "https://datastudio.google.com/reporting/f59aaaaf-5b32-43e7-a57b-f9ac32ce6a3d"

    columns:
      - name: date
        description: "Calendar date of aggregated metrics"
        tests:
          - not_null
          - unique

      - name: revenue
        description: >
          Total revenue generated per day across all users and products.
          Core business KPI for financial monitoring.
        tests:
          - not_null
